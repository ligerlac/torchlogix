name: parametrization-dense

params:

  # ─────────────────────────────────────────────
  # Residual / parametrization hyperparameters
  # ─────────────────────────────────────────────

  parametrization_temperature:
    type: float
    low: 0.1
    high: 10.0
    log: true

  parametrization_temperature_decay:
    type: categorical
    choices: [null, "linear", "exponential"]

  parametrization_temperature_end:
    type: float
    low: 1e-3
    high_ref: parametrization_temperature
    log: true
    when:
      parametrization_temperature_decay: ["linear", "exponential"]

  # ─────────────────────────────────────────────
  # Training hyperparameters
  # ─────────────────────────────────────────────

  learning_rate:
    type: float
    low: 1e-3
    high: 0.1
    log: true

  lr_schedule:
    type: categorical
    choices: [null, "CosineAnnealingWarmRestarts", "ReduceLROnPlateau"]

  lr_patience:
    type: int
    low: 2
    high: 10
    when:
      lr_schedule: ["CosineAnnealingWarmRestarts", "ReduceLROnPlateau"]

  lr_reduction_factor:
    type: float
    low: 0.1
    high: 1.0
    log: true
    when:
      lr_schedule: ["ReduceLROnPlateau"]


studies:
  
  - name: walsh-cifar-rank-2
    architecture: DlgnCifar10Small
    parametrization: walsh
    dataset: cifar-10
    lut_rank: 2

  - name: walsh-mnist-rank-2
    architecture: DlgnMnistSmall
    parametrization: walsh
    dataset: mnist
    lut_rank: 2

  - name: walsh-fmnist-rank-2
    architecture: DlgnFashionMnistSmall
    parametrization: walsh
    dataset: fashion-mnist
    lut_rank: 2

  - name: walsh-jsc-rank-2
    architecture: DlgnJscSmall50Bits
    parametrization: walsh
    dataset: jsc
    lut_rank: 2

  - name: walsh-cifar-rank-4
    architecture: DlgnCifar10SmallRank4
    parametrization: walsh
    dataset: cifar-10
    lut_rank: 4

  - name: walsh-mnist-rank-4
    architecture: DlgnMnistSmallRank4
    parametrization: walsh
    dataset: mnist
    lut_rank: 4

  - name: walsh-fmnist-rank-4
    architecture: DlgnFashionMnistSmallRank4
    parametrization: walsh
    dataset: fashion-mnist
    lut_rank: 4

  - name: walsh-jsc-rank-4
    architecture: DlgnJscSmall50BitsRank4
    parametrization: walsh
    dataset: jsc
    lut_rank: 4

  - name: walsh-cifar-rank-6
    architecture: DlgnCifar10SmallRank6
    parametrization: walsh
    dataset: cifar-10
    lut_rank: 6

  - name: walsh-mnist-rank-6
    architecture: DlgnMnistSmallRank6
    parametrization: walsh
    dataset: mnist
    lut_rank: 6

  - name: walsh-fmnist-rank-6
