defaults:
  num_iterations: 100000
  # num_iterations: 200
  eval_freq: 1000
  connections: fixed
  weight_init: residual
  half_precision: true
  device: cuda
  seed: null
  output: null
  forward_sampling: gumbel_soft
  batch_size: 128
  residual_param: 5.0
