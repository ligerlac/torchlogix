name: cifar-10-conv-small-catalog

params:

  # ─────────────────────────────────────────────
  # Residual / parametrization hyperparameters
  # ─────────────────────────────────────────────

  one_minus_res_prob:
    type: float
    low: 0.001
    high: 0.9
    log: true

  parametrization_temperature:
    type: float
    low: 0.1
    high: 20.0
    log: true

  # ─────────────────────────────────────────────
  # Training hyperparameters
  # ─────────────────────────────────────────────

  learning_rate:
    type: float
    low: 1e-4
    high: 0.01
    log: true


studies:
    
  - name: walsh-rank_2-soft
    architecture: ClgnCifar10Small
    parametrization: walsh
    lut_rank: 2
    batch_size: 128
    forward_sampling: soft

  - name: walsh-rank_2-hard
    architecture: ClgnCifar10Small
    parametrization: walsh
    lut_rank: 2
    batch_size: 128
    forward_sampling: hard

  - name: walsh-rank_2-gumbel_soft
    architecture: ClgnCifar10Small
    parametrization: walsh
    lut_rank: 2
    batch_size: 128
    forward_sampling: gumbel_soft

  - name: walsh-rank_2-gumbel_hard
    architecture: ClgnCifar10Small
    parametrization: walsh
    lut_rank: 2
    batch_size: 128
    forward_sampling: gumbel_hard

  - name: walsh-rank_4-gumbel_soft
    architecture: ClgnCifar10SmallRank4
    parametrization: walsh
    lut_rank: 4
    batch_size: 128
    forward_sampling: gumbel_soft

  - name: walsh-rank_6-gumbel_soft
    architecture: ClgnCifar10SmallRank6
    parametrization: walsh
    lut_rank: 6
    batch_size: 128
    forward_sampling: gumbel_soft

  - name: walsh-rank_mixed-gumbel_soft
    architecture: ClgnCifar10SmallRankMixed
    parametrization: walsh
    lut_rank: mixed
    batch_size: 128
    forward_sampling: gumbel_soft


defaults:
  dataset: cifar-10
  num_iterations: 25_000
  eval_freq: 1000
  # num_iterations: 100
  # eval_freq: 100
  connections: fixed
  weight_init: residual-catalog
  device: cuda
  seed: null
  output: null
  compile_model: true
