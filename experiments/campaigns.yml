campaigns:
  - name: large_bs32
    architecture: DlgnMnistLarge
    batch_size: 32
    weight_init: random
    connections: fixed
    lut_rank: 4

  - name: tiny_bs128
    architecture: DlgnMnistTiny
    batch_size: 128
    weight_init: residual
    connections: fixed
    lut_rank: 2

defaults:
  dataset: mnist
  num_iterations: 1000
  eval_freq: 50
